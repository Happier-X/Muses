name: build-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi
      - run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - run: |
          cat > release_notes.txt << 'EOF'
          ## Muses v${{ env.VERSION }}

          ### 新功能
          - 应用正式更名为 Muses
          - 配置自动化发布流程，支持标签触发自动构建和发布

          ### 优化
          - 优化应用图标和启动画面
          - 更新应用描述和文档

          ### 技术改进
          - 升级 Flutter 到最新稳定版本
          - 优化构建流程，提高编译效率
          - 改进代码结构和可维护性

          ### 注意事项
          - 首次发布，欢迎体验和反馈
          - 如有问题，请在 GitHub Issues 中反馈
          EOF
      - run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk muses-v${VERSION}-arm64-v8a.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk muses-v${VERSION}-armeabi-v7a.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk muses-v${VERSION}-x86_64.apk
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body_path: release_notes.txt
          files: |
            muses-v${{ env.VERSION }}-arm64-v8a.apk
            muses-v${{ env.VERSION }}-armeabi-v7a.apk
            muses-v${{ env.VERSION }}-x86_64.apk

name: build-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi
      - run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          TAG=${VERSION/+/-}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
      - run: |
          LAST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n 1)
          if [ -n "$LAST_TAG" ]; then
            git log "${LAST_TAG}..HEAD" --pretty=format:"- %s%n%b" > release_notes.txt
          else
            git log -5 --pretty=format:"- %s%n%b" > release_notes.txt
          fi
          if [ ! -s release_notes.txt ]; then
            echo "- ${GITHUB_SHA}" > release_notes.txt
          fi
      - run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk muses-v${VERSION}-arm64-v8a.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk muses-v${VERSION}-armeabi-v7a.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk muses-v${VERSION}-x86_64.apk
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.TAG }}
          name: v${{ env.TAG }}
          body_path: release_notes.txt
          files: |
            muses-v${{ env.VERSION }}-arm64-v8a.apk
            muses-v${{ env.VERSION }}-armeabi-v7a.apk
            muses-v${{ env.VERSION }}-x86_64.apk

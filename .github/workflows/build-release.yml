name: build-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi --flavor prod
      - run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - run: |
          mv build/app/outputs/flutter-apk/app-prod-arm64-v8a-release.apk muses-v${VERSION}-arm64-v8a.apk
          mv build/app/outputs/flutter-apk/app-prod-armeabi-v7a-release.apk muses-v${VERSION}-armeabi-v7a.apk
          mv build/app/outputs/flutter-apk/app-prod-x86_64-release.apk muses-v${VERSION}-x86_64.apk
      - name: Extract changelog for current version
        run: |
          # Extract content between current version header and previous version header
          awk -v version="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" version "\\]") found=1
              next
            }
            found { print }
          ' CHANGELOG.md > release_notes.txt
          
          # Fallback if no changelog entry found
          if [ ! -s release_notes.txt ]; then
            echo "## Muses v${VERSION}" > release_notes.txt
            echo "" >> release_notes.txt
            echo "See [CHANGELOG.md](CHANGELOG.md) for details." >> release_notes.txt
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body_path: release_notes.txt
          files: |
            muses-v${{ env.VERSION }}-arm64-v8a.apk
            muses-v${{ env.VERSION }}-armeabi-v7a.apk
            muses-v${{ env.VERSION }}-x86_64.apk

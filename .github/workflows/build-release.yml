name: build-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - run: flutter pub get
      - name: Configure signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.keystore
          cat > ${{ github.workspace }}/key.properties << EOF
          SIGNING_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SIGNING_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          SIGNING_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          SIGNING_STORE_FILE=${{ github.workspace }}/release.keystore
          EOF
      - name: Build APKs and prepare release artifacts
        run: |
          flutter build apk --release --split-per-abi --flavor prod --no-tree-shake-icons
          
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          ls -la build/app/outputs/flutter-apk
          cd build/app/outputs/flutter-apk
          for apk in *-release.apk; do
            abi=$(echo "$apk" | grep -oP '(arm64-v8a|armeabi-v7a|x86_64)')
            if [ -n "$abi" ]; then
              mv "$apk" "muses-v${VERSION}-${abi}.apk"
            fi
          done
      - name: Extract changelog for current version
        run: |
          # Extract content between current version header and previous version header
          awk -v version="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" version "\\]") found=1
              next
            }
            found { print }
          ' CHANGELOG.md > release_notes.txt
          
          # Fallback if no changelog entry found
          if [ ! -s release_notes.txt ]; then
            echo "## Muses v${VERSION}" > release_notes.txt
            echo "" >> release_notes.txt
            echo "See [CHANGELOG.md](CHANGELOG.md) for details." >> release_notes.txt
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body_path: release_notes.txt
          files: |
            muses-v${{ env.VERSION }}-arm64-v8a.apk
            muses-v${{ env.VERSION }}-armeabi-v7a.apk
            muses-v${{ env.VERSION }}-x86_64.apk
